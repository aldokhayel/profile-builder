const YEARS = Array.from({ length: 2010 - 1960 + 1 }, (_, i) => 2010 - i);

function ProgressBar({ current, total, sectionIndex, sections }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div style={{ marginBottom: 32 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontFamily: "'Tajawal', sans-serif", fontSize: 13, color: "var(--muted)", fontWeight: 500 }}>
          {sections[sectionIndex]?.icon} {sections[sectionIndex]?.title}
        </span>
        <span style={{ fontFamily: "'Tajawal', sans-serif", fontSize: 13, color: "var(--muted)", fontWeight: 700 }}>{pct}%</span>
      </div>
      <div style={{ width: "100%", height: 6, background: "rgba(180,160,140,0.15)", borderRadius: 99, overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", background: "linear-gradient(90deg, " + (sections[sectionIndex]?.color || "#D4A574") + ", #C4849A)", borderRadius: 99, transition: "width 0.6s cubic-bezier(.4,0,.2,1)" }} />
      </div>
      <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
        {sections.map((s, i) => (
          <div key={i} style={{ flex: 1, height: 3, borderRadius: 99, background: i < sectionIndex ? s.color : i === sectionIndex ? s.color + "66" : "rgba(180,160,140,0.12)", transition: "background 0.4s" }} />
        ))}
      </div>
    </div>
  );
}

function QuestionCard({ question, value, onChange }) {
  const [animate, setAnimate] = useState(false);
  useEffect(() => {
    setAnimate(false);
    const t = setTimeout(() => setAnimate(true), 50);
    return () => clearTimeout(t);
  }, [question.id]);

  const wrapStyle = { opacity: animate ? 1 : 0, transform: animate ? "translateY(0)" : "translateY(24px)", transition: "all 0.5s cubic-bezier(.4,0,.2,1)" };
  const inputBase = {
    width: "100%", padding: "14px 18px", borderRadius: 14, border: "2px solid rgba(180,160,140,0.2)",
    background: "rgba(255,255,255,0.03)", fontFamily: "'Tajawal', sans-serif", fontSize: 17, color: "var(--text)", outline: "none", boxSizing: "border-box",
  };

  return (
    <div style={wrapStyle}>
      {question.scenario && (
        <div style={{
          background: "linear-gradient(135deg, rgba(212,165,116,0.10), rgba(196,132,154,0.10))",
          borderRadius: 16, padding: "18px 20px", marginBottom: 20, border: "1px solid rgba(212,165,116,0.15)",
          fontFamily: "'Aref Ruqaa', serif", fontSize: 16, lineHeight: 1.9, color: "var(--text)",
        }}>
          {"\u{1F4AD}"} {question.scenario}
        </div>
      )}
      <h2 style={{ fontFamily: "'Aref Ruqaa', serif", fontSize: 26, fontWeight: 700, color: "var(--text)", marginBottom: 6, lineHeight: 1.6 }}>{question.label}</h2>
      {question.subtitle && <p style={{ fontFamily: "'Tajawal', sans-serif", fontSize: 14, color: "var(--muted)", marginBottom: 24, lineHeight: 1.6 }}>{question.subtitle}</p>}

      {question.type === "text" && <input type="text" value={value || ""} onChange={(e) => onChange(e.target.value)} placeholder={question.placeholder} style={inputBase} />}

      {question.type === "textarea" && <textarea value={value || ""} onChange={(e) => onChange(e.target.value)} placeholder={question.placeholder} rows={4} style={Object.assign({}, inputBase, { fontSize: 16, resize: "vertical", lineHeight: 1.8 })} />}

      {question.type === "select" && (
        <select value={value || ""} onChange={(e) => onChange(e.target.value)} style={Object.assign({}, inputBase, { background: "var(--bg)", cursor: "pointer" })}>
          <option value="">{question.placeholder || "اختر..."}</option>
          {question.options.map((o) => <option key={o} value={o}>{o}</option>)}
        </select>
      )}

      {question.type === "slider" && (
        <div>
          <div style={{ textAlign: "center", fontFamily: "'Aref Ruqaa', serif", fontSize: 42, fontWeight: 700, color: "#D4A574", marginBottom: 16 }}>
            {value || question.default} <span style={{ fontSize: 18, color: "var(--muted)" }}>{question.unit}</span>
          </div>
          <input type="range" min={question.min} max={question.max} step={question.step} value={value || question.default} onChange={(e) => onChange(Number(e.target.value))} style={{ width: "100%", accentColor: "#D4A574", height: 8, cursor: "pointer", direction: "ltr" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'Tajawal', sans-serif", fontSize: 12, color: "var(--muted)", marginTop: 6, direction: "ltr" }}>
            <span>{question.min}</span><span>{question.max}</span>
          </div>
        </div>
      )}

      {question.type === "cards" && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {question.options.map((o) => {
            const sel = value === o;
            return (
              <button key={o} onClick={() => onChange(o)} style={{
                padding: "12px 22px", borderRadius: 14,
                border: sel ? "2px solid #D4A574" : "2px solid rgba(180,160,140,0.18)",
                background: sel ? "linear-gradient(135deg, rgba(212,165,116,0.15), rgba(196,132,154,0.10))" : "rgba(255,255,255,0.02)",
                fontFamily: "'Tajawal', sans-serif", fontSize: 15, fontWeight: sel ? 700 : 400,
                color: sel ? "#D4A574" : "var(--text)", cursor: "pointer", transition: "all 0.3s",
                boxShadow: sel ? "0 2px 12px rgba(212,165,116,0.15)" : "none",
              }}>{o}</button>
            );
          })}
        </div>
      )}

      {question.type === "multi" && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {question.options.map((o) => {
            const arr = value || [];
            const sel = arr.includes(o);
            return (
              <button key={o} onClick={() => sel ? onChange(arr.filter((x) => x !== o)) : onChange([].concat(arr, [o]))} style={{
                padding: "10px 18px", borderRadius: 12,
                border: sel ? "2px solid #7BA69E" : "2px solid rgba(180,160,140,0.18)",
                background: sel ? "rgba(123,166,158,0.12)" : "rgba(255,255,255,0.02)",
                fontFamily: "'Tajawal', sans-serif", fontSize: 14, fontWeight: sel ? 700 : 400,
                color: sel ? "#7BA69E" : "var(--text)", cursor: "pointer", transition: "all 0.3s",
              }}>{sel ? "\u2713 " : ""}{o}</button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function LoadingDots() {
  return (
    <div style={{ textAlign: "center", padding: "60px 20px" }}>
      <div style={{ fontSize: 48, marginBottom: 24, animation: "pulse 2s infinite" }}>{"\u270D\uFE0F"}</div>
      <h3 style={{ fontFamily: "'Aref Ruqaa', serif", fontSize: 24, color: "var(--text)", marginBottom: 12 }}>جارٍ صياغة بطاقتك...</h3>
      <p style={{ fontFamily: "'Tajawal', sans-serif", fontSize: 14, color: "var(--muted)", marginBottom: 24 }}>نُحبّر الكلمات بعناية لتعكس شخصيتك</p>
      <div style={{ display: "flex", justifyContent: "center", gap: 8 }}>
        {[0, 1, 2].map((i) => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: "50%", background: "#D4A574",
            animation: "bounce 1.4s " + (i * 0.16) + "s infinite ease-in-out both",
          }} />
        ))}
      </div>
    </div>
  );
}

// --- Local Profile Card Generator ---
function generateProfileCard(a) {
  const f = a.gender === "أنثى";
  const age = a.birthYear ? new Date().getFullYear() - parseInt(a.birthYear) : null;
  const pick = (...arr) => arr[Math.floor(Math.random() * arr.length)];
  const parts = [];

  parts.push(pick("✦ بسم الله الرحمن الرحيم ✦", "❊ بطاقة التعارف ❊", "── بسم الله ──"));

  const city = a.city || "مدينة جميلة";
  const origin = a.origin ? "، وأصل" + (f ? "ها" : "ه") + " من " + a.origin : "";
  const ageStr = age && age > 15 && age < 75 ? "في عمر الـ" + age : "";
  parts.push(f
    ? pick(
        "من " + city + origin + "، تقف " + ageStr + " فتاةٌ أصيلة تحمل بين جنبيها روحاً دافئةً وعقلاً ناضجاً. تُقدّم نفسها اليوم بكل صدق وثقة.",
        ageStr + "، ومن أرض " + city + origin + "، تطلّ هذه السيرة العطرة... فتاةٌ نشأت على القيم الأصيلة، وصاغت الحياة فيها شخصيةً متوازنة."
      )
    : pick(
        "من " + city + origin + "، يتقدّم " + ageStr + " شابٌ أصيل يحمل بين جنبيه طموحاً صادقاً وقلباً نابضاً. يُقدّم نفسه اليوم بكل صدق وثقة.",
        ageStr + "، ومن أرض " + city + origin + "، يطلّ هذا الشاب بسيرته... نشأ على القيم الأصيلة، وصاغت الحياة فيه شخصيةً راسخة."
      )
  );

  const ph = [];
  if (a.height) ph.push((f ? "طولها " : "طوله ") + a.height + " سم");
  if (a.weight) ph.push((f ? "ووزنها " : "ووزنه ") + a.weight + " كجم");
  if (a.skinColor) ph.push((f ? "بشرتها " : "بشرته ") + a.skinColor);
  if (a.bodyType) ph.push((f ? "وبنيتها " : "وبنيته ") + a.bodyType);
  if (ph.length) parts.push("❊ الهيئة والمظهر ❊

" + ph.join("، ") + ".");

  const rel = [];
  if (a.prayerCommitment) rel.push(a.prayerCommitment);
  if (a.nawafil && a.nawafil !== "نادراً") rel.push((f ? "تحرص على النوافل (" : "يحرص على النوافل (") + a.nawafil + ")");
  if (a.quran) rel.push((f ? "علاقتها بالقرآن: " : "علاقته بالقرآن: ") + a.quran);
  if (f && a.hijab) rel.push(a.hijab);
  if (a.religiousLevel) rel.push((f ? "تصف نفسها بـ«" : "يصف نفسه بـ«") + a.religiousLevel + "»");
  if (rel.length) parts.push("✦ الجانب الديني ✦

الدين في حياة" + (f ? "ها" : "ه") + " ليس طارئاً بل أساس — " + rel.join("، ") + ".");

  const edu = [];
  if (a.education) edu.push((f ? "مؤهلها " : "مؤهله ") + a.education);
  if (a.major) edu.push("تخصص" + (f ? "ت " : " ") + "في " + a.major);
  if (a.workStatus) edu.push(a.workStatus);
  if (a.workField) edu.push("في مجال " + a.workField);
  if (edu.length) parts.push("❊ التعليم والعمل ❊

" + edu.join("، ") + ".");

  const hob = a.hobbies && a.hobbies.length ? a.hobbies : [];
  if (hob.length || a.freeTime || a.dreamDestination || a.visitedCountries) {
    let s = "✦ الاهتمامات والهوايات ✦

";
    if (hob.length) s += (f ? "تتقاطع اهتماماتها" : "تتقاطع اهتماماته") + " عند: " + hob.join(" • ") + ". ";
    if (a.freeTime) s += (f ? "وعن يوم إجازتها تقول: «" : "وعن يوم إجازته يقول: «") + a.freeTime + "». ";
    if (a.visitedCountries) s += (f ? "زارت: " : "زار: ") + a.visitedCountries + ". ";
    if (a.dreamDestination) s += (f ? "ووجهة أحلامها: " : "ووجهة أحلامه: ") + a.dreamDestination + ".";
    parts.push(s.trim());
  }

  if (a.lifeGoals) parts.push("❊ الأحلام والطموحات ❊

" + (f ? "تحمل في قلبها طموحات كبيرة: «" : "يحمل في قلبه طموحات كبيرة: «") + a.lifeGoals + "»");

  const scen = [];
  if (a.scenario_weekend) scen.push((f ? "عطلتها المثالية: «" : "عطلته المثالية: «") + a.scenario_weekend + "»");
  if (a.scenario_conflict) scen.push("عند الخلاف: " + a.scenario_conflict);
  if (a.scenario_family) scen.push((f ? "علاقتها بأهل الزوج: " : "علاقته بأهل الزوجة: ") + a.scenario_family);
  if (a.scenario_finance) scen.push("في إدارة المال: " + a.scenario_finance);
  if (scen.length) parts.push("✦ الشخصية والتفضيلات ✦

" + scen.join("
"));

  const tr = a.partnerTraits && a.partnerTraits.length ? a.partnerTraits : [];
  if (tr.length) parts.push((f ? "❊ في شريك المستقبل ❊

تبحث عمّن يجمع: " : "❊ في شريكة المستقبل ❊

يبحث عمّن تجمع: ") + tr.join(" و") + ".");

  if (a.aboutYou) parts.push((f ? "✦ بقلمها ✦

«" : "✦ بقلمه ✦

«") + a.aboutYou + "»");

  parts.push(pick(
    "── ── ──

اللهم يسّر لكل من في قلبه نية صادقة، وبارك في كل خطوة تُخطى نحو الحلال. آمين.",
    "── ── ──

نسأل الله أن يكتب لكل قلبٍ طيّب ما يُسعده، وأن يجمع الأرواح المتوافقة. آمين.",
    "── ── ──

وفّق الله الجميع، وجمع بين المتوافقين، وبارك في كل لقاءٍ يُراد به وجهه الكريم. آمين."
  ));

  return parts.join("\n\n");
}


function App() {
  const [screen, setScreen] = useState("welcome");
  const [answers, setAnswers] = useState({});
  const [flatIndex, setFlatIndex] = useState(0);
  const [generatedProfile, setGeneratedProfile] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const gender = answers.gender || null;
  const sections = getQuestions(gender);

  const flatQuestions = [];
  const sectionMap = [];
  sections.forEach((sec, si) => {
    sec.questions.forEach((q) => {
      flatQuestions.push(q);
      sectionMap.push(si);
    });
  });

  const activeQuestions = [];
  const activeSectionMap = [];
  flatQuestions.forEach((q, i) => {
    if (!q.condition || q.condition(answers)) {
      activeQuestions.push(q);
      activeSectionMap.push(sectionMap[i]);
    }
  });

  const currentQ = activeQuestions[flatIndex];
  const currentSection = activeSectionMap[flatIndex] !== undefined ? activeSectionMap[flatIndex] : 0;
  const totalQ = activeQuestions.length;
  const currentValue = currentQ ? answers[currentQ.id] : undefined;

  const canNext = (function() {
    if (!currentQ) return false;
    if (currentQ.type === "slider") return true;
    if (currentQ.type === "multi") return currentValue && currentValue.length > 0;
    return currentValue !== undefined && currentValue !== "" && currentValue !== null;
  })();

  const buildPromptData = () => {
    const f = gender === "أنثى";
    let data = "الجنس: " + gender + "\n";
    data += "سنة الميلاد: " + (answers.birthYear || "\u2014") + "\n";
    data += "مدينة الإقامة: " + (answers.city || "\u2014") + "\n";
    data += "الطول: " + (answers.height || "\u2014") + " سم\n";
    data += "الوزن: " + (answers.weight || "\u2014") + " كجم\n";
    data += "لون البشرة: " + (answers.skinColor || "\u2014") + "\n";
    data += "بنية الجسم: " + (answers.bodyType || "\u2014") + "\n";
    data += "الحالة الاجتماعية: " + (answers.maritalStatus || "\u2014") + "\n";
    data += "الانتماء القبلي: " + (answers.tribe || "\u2014") + "\n";
    if (answers.tribeRegion) data += "منطقة القبيلة: " + answers.tribeRegion + "\n";
    data += "الأصل: " + (answers.origin || "\u2014") + "\n";
    data += "الالتزام بالصلاة: " + (answers.prayerCommitment || "\u2014") + "\n";
    data += "النوافل: " + (answers.nawafil || "\u2014") + "\n";
    data += "علاقته بالقرآن: " + (answers.quran || "\u2014") + "\n";
    if (f && answers.hijab) data += "الحجاب: " + answers.hijab + "\n";
    data += "مستوى التدين: " + (answers.religiousLevel || "\u2014") + "\n";
    data += "المؤهل الدراسي: " + (answers.education || "\u2014") + "\n";
    data += "التخصص: " + (answers.major || "\u2014") + "\n";
    data += "الوضع الوظيفي: " + (answers.workStatus || "\u2014") + "\n";
    if (answers.workField) data += "مجال العمل: " + answers.workField + "\n";
    if (answers.workEnvironment) data += "بيئة العمل: " + answers.workEnvironment + "\n";
    if (answers.hobbies && answers.hobbies.length) data += "الهوايات: " + answers.hobbies.join("، ") + "\n";
    if (answers.freeTime) data += "وقت الفراغ: " + answers.freeTime + "\n";
    if (answers.visitedCountries) data += "الدول المُزارة: " + answers.visitedCountries + "\n";
    if (answers.dreamDestination) data += "الوجهة الحلم: " + answers.dreamDestination + "\n";
    if (answers.lifeGoals) data += "الأحلام والطموحات: " + answers.lifeGoals + "\n";
    if (answers.scenario_weekend) data += "عطلة نهاية الأسبوع المثالية: " + answers.scenario_weekend + "\n";
    if (answers.scenario_conflict) data += "أسلوب حل الخلافات: " + answers.scenario_conflict + "\n";
    if (answers.scenario_family) data += "العلاقة بأهل الشريك: " + answers.scenario_family + "\n";
    if (answers.scenario_finance) data += "إدارة الشؤون المالية: " + answers.scenario_finance + "\n";
    if (answers.partnerTraits && answers.partnerTraits.length) data += "صفات الشريك المثالي: " + answers.partnerTraits.join("، ") + "\n";
    if (answers.aboutYou) data += "كلمة أخيرة: " + answers.aboutYou + "\n";
    return data;
  };

  const generateWithClaude = () => {
    setLoading(true);
    setError("");
    setScreen("result");
    setTimeout(() => {
      try {
        setGeneratedProfile(generateProfileCard(answers));
      } catch (e) {
        setError("حدث خطأ. حاول مرة أخرى.");
      }
      setLoading(false);
    }, 2200);
  };

  const handleNext = () => {
    if (flatIndex < totalQ - 1) {
      setFlatIndex(flatIndex + 1);
    } else {
      generateWithClaude();
    }
  };

  const handlePrev = () => {
    if (flatIndex > 0) setFlatIndex(flatIndex - 1);
  };

  const handleAnswer = (val) => {
    if (currentQ.id === "gender" && val !== answers.gender) {
      setAnswers({ gender: val });
    } else {
      setAnswers(Object.assign({}, answers, { [currentQ.id]: val }));
    }
  };

  const copyProfile = () => {
    navigator.clipboard.writeText(generatedProfile).catch(function() {});
  };

  return (
    <div>

      <div style={{ maxWidth: 620, margin: "0 auto", padding: "24px 16px 60px", direction: "rtl", fontFamily: "'Tajawal', sans-serif", minHeight: "100vh" }}>

    const generateWithClaude = () => {
    setLoading(true);
    setError("");
    setScreen("result");
    setTimeout(() => {
      try {
        setGeneratedProfile(generateProfileCard(answers));
      } catch (e) {
        setError("\u062d\u062f\u062b \u062e\u0637\u0623. \u062d\u0627\u0648\u0644 \u0645\u0631\u0629 \u0623\u062e\u0631\u0649.");
      }
      setLoading(false);
    }, 2200);
  }; 4px 32px rgba(0,0,0,0.06)",
              marginBottom: 24, minHeight: 260,
            }}>
              <QuestionCard question={currentQ} value={currentValue} onChange={handleAnswer} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
              <button onClick={handlePrev} disabled={flatIndex === 0} style={{
                padding: "12px 28px", borderRadius: 14, border: "2px solid rgba(180,160,140,0.18)",
                background: "transparent", fontFamily: "'Tajawal', sans-serif", fontSize: 15, fontWeight: 600,
                color: flatIndex === 0 ? "rgba(180,160,140,0.3)" : "var(--muted)",
                cursor: flatIndex === 0 ? "default" : "pointer", transition: "all 0.3s",
              }}>{"\u2192 السابق"}</button>
              <span style={{ fontFamily: "'Tajawal', sans-serif", fontSize: 13, color: "var(--muted)", opacity: 0.6 }}>{flatIndex + 1} / {totalQ}</span>
              <button className="btn-main" onClick={handleNext} disabled={!canNext} style={{
                background: canNext ? "linear-gradient(135deg, #D4A574, #C4849A)" : "rgba(180,160,140,0.15)",
                color: canNext ? "#fff" : "var(--muted)", cursor: canNext ? "pointer" : "default", padding: "12px 32px", fontSize: 15,
              }}>
                {flatIndex === totalQ - 1 ? "\u2728 صياغة البطاقة" : "التالي \u2190"}
              </button>
            </div>
          </div>
        )}

        {screen === "result" && (
          <div style={{ animation: "fadeUp 0.8s ease-out" }}>
            {loading ? (
              <LoadingDots />
            ) : error ? (
              <div style={{ textAlign: "center", padding: "60px 20px" }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>{"\u26A0\uFE0F"}</div>
                <p style={{ fontFamily: "'Tajawal', sans-serif", fontSize: 16, color: "#e57373", marginBottom: 24 }}>{error}</p>
                <button className="btn-main" onClick={generateWithClaude} style={{ background: "linear-gradient(135deg, #D4A574, #C4849A)", color: "#fff" }}>{"\u{1F504} إعادة المحاولة"}</button>
              </div>
            ) : (
              <div>
                <div style={{ textAlign: "center", marginBottom: 28 }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>{"\u2728"}</div>
                  <h2 style={{ fontFamily: "'Aref Ruqaa', serif", fontSize: 30, fontWeight: 700, color: "var(--text)", marginBottom: 8 }}>بطاقتك جاهزة</h2>
                  <p style={{ fontSize: 14, color: "var(--muted)" }}>تم صياغتها بأسلوب أدبي مميز بواسطة الذكاء الاصطناعي</p>
                </div>
                <div className="profile-result">{generatedProfile}</div>
                <div style={{ display: "flex", justifyContent: "center", gap: 12, marginTop: 24, flexWrap: "wrap" }}>
                  <button className="btn-main" onClick={copyProfile} style={{ background: "linear-gradient(135deg, #D4A574, #C4849A)", color: "#fff" }}>{"\u{1F4CB} نسخ البطاقة"}</button>
                  <button className="btn-main" onClick={generateWithClaude} style={{ background: "transparent", border: "2px solid rgba(123,166,158,0.4)", color: "#7BA69E" }}>{"\u270D\uFE0F إعادة الصياغة"}</button>
                  <button className="btn-main" onClick={() => { setScreen("welcome"); setAnswers({}); setFlatIndex(0); setGeneratedProfile(""); }} style={{ background: "transparent", border: "2px solid rgba(180,160,140,0.25)", color: "var(--muted)" }}>{"\u{1F504} بدء من جديد"}</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
